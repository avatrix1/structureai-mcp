name: AI PR Description
on:
  pull_request:
    types: [opened, synchronize]
permissions:
  pull-requests: write
  contents: read
jobs:
  describe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: avatrix1/ai-pr-description@v1
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
